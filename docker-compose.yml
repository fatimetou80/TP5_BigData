services:
  kafka:
    container_name: tp5-kafka
    image: apache/kafka:latest
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=0
      - KAFKA_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_HEAP_OPTS=-Xms256m -Xmx512m
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --topic bank-transactions --partitions 3 --replication-factor 1 \
          --bootstrap-server kafka:9092
        echo "Topic bank-transactions ready."

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tp5-kafka-ui
    depends_on: [kafka]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=tp5-bank
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092

  spark-master:
    image: sidi-spark:3.5.3-py311
    pull_policy: never
    container_name: tp5-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "127.0.0.1:7077:7077"
      - "127.0.0.1:8081:8080"
    volumes:
      - ./spark:/opt/spark/conf
      - ./src:/workspace/src
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
    environment:
      - SPARK_DAEMON_MEMORY=512m
      - PYSPARK_PYTHON=/usr/bin/python3.11

  spark-worker-1:
    image: sidi-spark:3.5.3-py311
    pull_policy: never
    container_name: tp5-spark-worker-1
    depends_on: [spark-master]
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
    volumes:
      - ./src:/workspace/src
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
    environment:
      - SPARK_DAEMON_MEMORY=1024m
      - PYSPARK_PYTHON=/usr/bin/python3.11

  spark-worker-2:
    image: sidi-spark:3.5.3-py311
    pull_policy: never
    container_name: tp5-spark-worker-2
    depends_on: [spark-master]
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8082"
    volumes:
      - ./src:/workspace/src
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
    environment:
      - SPARK_DAEMON_MEMORY=1024m
      - PYSPARK_PYTHON=/usr/bin/python3.11

  spark-worker-3:
    image: sidi-spark:3.5.3-py311
    pull_policy: never
    container_name: tp5-spark-worker-3
    depends_on: [spark-master]
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8083"
    volumes:
      - ./src:/workspace/src
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
    environment:
      - SPARK_DAEMON_MEMORY=1024m
      - PYSPARK_PYTHON=/usr/bin/python3.11

  transaction-generator:
    build:
      context: .
      dockerfile: docker/generator/Dockerfile
    container_name: tp5-transaction-generator
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=bank-transactions
      - N_CLIENTS=${N_CLIENTS:-500}
      - M_EXTERNAL=${M_EXTERNAL:-1000}
      - PEAK_MULTIPLIER=${PEAK_MULTIPLIER:-5}
      - FRAUD_RATE=${FRAUD_RATE:-0.001}
      - TICK_SECONDS=1
    restart: unless-stopped

  spark-processor:
    image: sidi-spark:3.5.3-py311
    pull_policy: never
    container_name: tp5-spark-processor
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
      - spark-worker-3
      - kafka-init
    command:
      - /bin/bash
      - -lc
      - |
        /opt/spark/bin/spark-submit \
          --master spark://spark-master:7077 \
          --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.apache.kafka:kafka-clients:3.5.1 \
          --conf spark.sql.shuffle.partitions=8 \
          --conf spark.driver.memory=1536m \
          --conf spark.executor.memory=1536m \
          /workspace/src/spark_processor.py
    volumes:
      - ./src:/workspace/src
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=bank-transactions
      - OUTPUT_BASE=/workspace/data/output
      - CHECKPOINT_BASE=/workspace/checkpoints
      - TRIGGER_INTERVAL=10 seconds
    restart: unless-stopped

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tp5-jupyter
    depends_on:
      - spark-master
      - kafka
      - spark-processor
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:4040:4040"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=tp5fraud2026
      - SPARK_MASTER=spark://spark-master:7077
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OUTPUT_BASE=/workspace/data/output
      - PYSPARK_SUBMIT_ARGS=--conf spark.pyspark.python=/usr/bin/python3.11 --conf spark.pyspark.driver.python=/opt/conda/bin/python --conf spark.driver.memory=1024m --conf spark.executor.memory=1024m --conf spark.sql.shuffle.partitions=4 --master spark://spark-master:7077 --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.apache.kafka:kafka-clients:3.5.1 pyspark-shell
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./src:/workspace/src
      - ./data:/workspace/data
      - ./checkpoints:/workspace/checkpoints

volumes:
  kafka_data:
